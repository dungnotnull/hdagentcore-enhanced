name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this form to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of agentcore-enhanced are you using?
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of agentcore-enhanced is affected?
      options:
        - Provider Adapter
        - MCP Manager
        - Benchmark
        - Pattern Library
        - Orchestrator
        - API Server
        - CLI
        - Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste relevant logs or error messages
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g. Ubuntu 22.04, macOS 14, Windows 11]
        - Python: [e.g. 3.12.0]
        - Docker: [e.g. 24.0.0, or N/A]
        - Providers configured: [e.g. Claude, OpenAI, Ollama]
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        Share your .env configuration (with sensitive keys removed):
        - PRIVACY_MODE=true/false
        - Which providers have API keys set?
        - Any custom settings?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for similar bugs
          required: true
        - label: I have provided a minimal reproducible example
          required: true
        - label: I have included relevant logs and error messages
          required: false
        - label: I am using the latest version
          required: false
